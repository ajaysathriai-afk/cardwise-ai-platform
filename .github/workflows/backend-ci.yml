name: CardWise CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  legacy-backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Docker Image
        run: |
          docker build -t cardwise-backend .

  microservices-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, recommendation-service, rag-service]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} Docker Image
        run: |
          docker build -t cardwise-${{ matrix.service }} ./services/${{ matrix.service }}
