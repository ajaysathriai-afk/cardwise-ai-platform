services:

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"

  recommendation-service:
    build: ./services/recommendation-service
    ports:
      - "8001:8001"
    env_file:
      - ./services/recommendation-service/.env

  rag-service:
    build: ./services/rag-service
    ports:
      - "8002:8002"
    env_file:
      - ./services/rag-service/.env
    volumes:
      - ./services/rag-service/vector_db:/app/vector_db
